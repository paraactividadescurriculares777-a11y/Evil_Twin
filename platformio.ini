; PlatformIO — Evil Twin APSTA No-Bloqueante
; Sociedad Científica UMSS San Simón
; ============================================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Puerto serie (ajustar según tu sistema)
; Linux:   /dev/ttyUSB0
; Windows: COM3
monitor_speed = 115200

; Particiones: reserva espacio para SPIFFS
board_build.partitions = min_spiffs.csv

; ============================================================================
; NAT ROUTING — Para que clientes del AP falso tengan Internet real
;
; OPCIÓN A (recomendada, frameworks 2.x):
;   Crea el archivo sdkconfig.defaults en la raíz del proyecto
;   con el contenido indicado abajo y descomenta la línea siguiente:
;
; board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.defaults"
;
; OPCIÓN B (build flags directos — puede no funcionar en todos los frameworks):
; ============================================================================
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_LWIP_IP_FORWARD=1
    -DCONFIG_LWIP_IPV4_NAPT=1

; ============================================================================
; NOTA SOBRE sdkconfig.defaults (Opción A)
; Crea un archivo llamado "sdkconfig.defaults" en la carpeta del proyecto
; con este contenido:
;
;   CONFIG_LWIP_IP_FORWARD=y
;   CONFIG_LWIP_IPV4_NAPT=y
;
; Luego en platformio.ini descomenta:
;   board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.defaults"
;
; Si el NAT no compila, el código igual funciona sin él:
;   - AP falso activo
;   - Portal cautivo activo
;   - Credenciales capturadas
;   - Solo sin reenvío de tráfico a Internet
; ============================================================================
